name: Restore original T bot structure

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Restrict removal to actual API commands
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/restore_original_t.py')
          text = path.read_text(encoding='utf-8')
          old = """    removed = set(EXPLICIT_REMOVE)\n    for path in COMMANDS.glob('*.js'):\n        stem = path.stem\n        if stem in SUPPORTED:\n            continue\n        text = path.read_text(encoding='utf-8', errors='ignore')\n        if NETWORK_MARKERS.search(text):\n            removed.add(stem)\n"""
          if old not in text:
              raise SystemExit('Expected scanner block was not found')
          path.write_text(text.replace(old, "    removed = set(EXPLICIT_REMOVE)\n"), encoding='utf-8')
          PY

      - name: Restore original structure and apply requested changes
        id: migration
        continue-on-error: true
        shell: bash
        run: python3 .github/restore_original_t.py > /tmp/t-migration.log 2>&1

      - name: Save migration diagnostic
        if: steps.migration.outcome == 'failure'
        shell: bash
        run: |
          tail -n 120 /tmp/t-migration.log > MIGRATION_ERROR.log
          git config user.name 'Cod3Uchiha'
          git config user.email '157640942+Cod3Uchiha@users.noreply.github.com'
          git add MIGRATION_ERROR.log
          git commit -m 'Record T migration diagnostic'
          git push origin HEAD:agent/run-original-t-migration
          exit 1

      - name: Final branding and syntax validation
        if: steps.migration.outcome == 'success'
        shell: bash
        run: |
          sed -i 's/Original KnightBot layout preserved/Original bot layout preserved/g' MIGRATION_REPORT.json
          if grep -Rni --exclude-dir=.git --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.png' --exclude='*.webp' 'knight' .; then
            echo 'Old branding remains.'
            exit 1
          fi
          node --check main.js
          node --check lib/tkmApi.js
          node --check commands/play.js
          node --check commands/song.js
          node --check commands/video.js
          node --check commands/tiktok.js
          node --check commands/imagine.js
          node --check commands/emojimix.js
          node --check commands/translate.js

      - name: Commit corrected bot to main
        if: steps.migration.outcome == 'success'
        shell: bash
        run: |
          rm -f .github/restore_original_t.py .github/workflows/restore-original-t.yml
          git config user.name 'Cod3Uchiha'
          git config user.email '157640942+Cod3Uchiha@users.noreply.github.com'
          git add -A
          git commit -m 'Restore original bot structure and rebrand to T'
          git push origin HEAD:main
